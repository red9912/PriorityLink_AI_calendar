    - I go to the [gym](task) [everyday](day) from [6 AM](time_start) to [7 AM](time_end)
    - I have [dinner](task) [everyday](day) from [1 PM](time_start) to [2 PM](time_end)
    - I want to insert [soccer game](task) on [Saturday](day) between [20](time_start) and [21](time_end)
